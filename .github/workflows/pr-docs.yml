name: PR - Validate 

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - README.md
      - package.json
      - package-lock.json

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Validate VitePress site
        run: npm run docs:build
