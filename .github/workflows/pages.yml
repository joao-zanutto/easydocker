name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - package.json
      - package-lock.json
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  discover-tapes:
    runs-on: ubuntu-latest
    outputs:
      tapes: ${{ steps.set-matrix.outputs.tapes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Discover VHS tapes
        id: set-matrix
        run: |
          tapes=$(find docs/tapes -maxdepth 1 -type f -name '*.tape' | sed 's|^docs/tapes/||' | sort | python3 -c 'import json,sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')
          echo "tapes=$tapes" >> $GITHUB_OUTPUT

  render-gifs:
    needs: discover-tapes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tape: ${{ fromJson(needs.discover-tapes.outputs.tapes) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest
          curl -fsSL https://raw.githubusercontent.com/joao-zanutto/easydocker/main/install/install.sh | sh

      - name: Render tape
        run: |
          mkdir -p docs/public
          tape="docs/tapes/${{ matrix.tape }}"
          filename="$(basename "$tape" .tape)"
          gif="docs/public/${filename}.gif"
          echo "Rendering $tape -> $gif"
          sed -E "s|^Output[[:space:]]+[^[:space:]]+|Output $gif|" "$tape" | vhs

      - name: Upload GIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhs-gifs-${{ matrix.tape }}
          path: docs/public/*.gif

  build:
    needs: render-gifs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download GIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: docs/public

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Build site
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
