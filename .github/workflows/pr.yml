name: PR - Test, Validate & Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/**/*.go"
      - go.mod
      - go.sum

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check go fmt
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go formatting issues found:"
            gofmt -s -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./cmd/easydocker

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: easydocker-linux-amd64
          path: easydocker
